name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Deny check
        uses: EmbarkStudios/cargo-deny-action@v2

      - name: Format check
        run: cargo fmt --check

      - name: Type + compile check
        run: cargo check

      - name: Lint code
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build release
        run: cargo build --release
  validate-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run linting
        run: |
          cd frontend
          npm run lint:check

      - name: Run formatting
        run: |
          cd frontend
          npm run format:check
